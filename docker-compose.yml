services:
  postgres:
    image: postgres:17
    container_name: mlops_postgres
    environment:
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops123
      POSTGRES_DB: mlops
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
  minio:
    image: quay.io/minio/minio:latest
    container_name: mlops_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.1.2
    container_name: mlops_kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    restart: unless-stopped

  neo4j:
    image: neo4j:2025.09.0
    container_name: mlops_neo4j
    environment:
      NEO4J_AUTH: neo4j/password123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  graphql_api:
    build:
      context: ./services/graphql_api
    container_name: mlops_graphql_api
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: password123
    ports:
      - "8000:8000"
    depends_on:
      - neo4j
    restart: unless-stopped

  airflow-init:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow_init
    depends_on:
      - postgres
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops123@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
      AIRFLOW__API__SECRET_KEY: "7b8d2c4f0a6e1b9c3d5f7a8e2c4b6d8f6c5d4e3f2a1f3a9b8c7d6e5f4a3"
      AIRFLOW__API_AUTH__JWT_SECRET: "d9b8c7a6f5e4d3c2b1a0987654321fedcd8b4a2c6f"
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/airflow/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -c "
      airflow db migrate
      "
    restart: "no"

  airflow-webserver:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow_webserver
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops123@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
      AIRFLOW__API__SECRET_KEY: "7b8d2c4f0a6e1b9c3d5f7a8e2c4b6d8f6c5d4e3f2a1f3a9b8c7d6e5f4a3"
      AIRFLOW__API_AUTH__JWT_SECRET: "d9b8c7a6f5e4d3c2b1a0987654321fedcd8b4a2c6f"
      DOCKER_API_VERSION: "1.44"
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/airflow/project
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8080:8080"
    command: api-server
    restart: unless-stopped

  airflow-scheduler:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow_scheduler
    depends_on:
      - postgres
      - airflow-init
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops123@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
      AIRFLOW__API__SECRET_KEY: "7b8d2c4f0a6e1b9c3d5f7a8e2c4b6d8f6c5d4e3f2a1f3a9b8c7d6e5f4a3"
      AIRFLOW__API_AUTH__JWT_SECRET: "d9b8c7a6f5e4d3c2b1a0987654321fedcd8b4a2c6f"
      DOCKER_API_VERSION: "1.44"
    env_file:
      - .env
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/airflow/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    restart: unless-stopped

  airflow-dag-processor:
    build:
      context: ./airflow
      dockerfile: Dockerfile
    container_name: airflow_dag_processor
    depends_on:
      - postgres
      - airflow-init
    env_file:
      - .env
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://mlops:mlops123@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "True"
      AIRFLOW__API__BASE_URL: http://airflow-webserver:8080
      AIRFLOW__API__SECRET_KEY: "7b8d2c4f0a6e1b9c3d5f7a8e2c4b6d8f6c5d4e3f2a1f3a9b8c7d6e5f4a3"
      AIRFLOW__API_AUTH__JWT_SECRET: "d9b8c7a6f5e4d3c2b1a0987654321fedcd8b4a2c6f"
      DOCKER_API_VERSION: "1.44"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./:/opt/airflow/project
      - /var/run/docker.sock:/var/run/docker.sock
    command: dag-processor
    restart: unless-stopped

  data_ingestion:
    build:
      context: ./services/data_ingestion
    container_name: fraud_data_ingestion
    volumes:
      - shared_data:/data
      - ./kaggle.json:/root/.kaggle/kaggle.json:ro
    restart: "no"  

  producer:
    build:
      context: ./services/producer
    container_name: mlops_producer
    environment:
      PYTHONUNBUFFERED: 1
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw_events
      PRODUCER_INTERVAL_SECONDS: 0.2
      CSV_PATH: /data/creditcard.csv
    volumes:
      - ./data:/data
    depends_on:
      - kafka
      - kafka-init
    restart: unless-stopped

  consumer:
    build:
      context: ./services/consumer
    container_name: mlops_consumer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw_events
      KAFKA_GROUP_ID: raw-events-consumer-group
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin123
      MINIO_BUCKET: fraud-lake
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: mlops
      POSTGRES_USER: mlops
      POSTGRES_PASSWORD: mlops123
      PYTHONUNBUFFERED: 1
    depends_on:
      - kafka
      - minio
      - postgres
    restart: unless-stopped

  transform:
    build:
      context: ./services/transform
    container_name: mlops_transform
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: fraud-lake
      BRONZE_PREFIX: bronze/transactions/
      SILVER_PREFIX: silver/transactions_clean/
      STATE_OBJECT: _state/bronze_to_silver/processed_files.json
    depends_on:
      - minio
    restart: "no"

  gold_builder:
    build:
      context: ./services/gold_builder
    container_name: mlops_gold_builder
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: fraud-lake
      SILVER_PREFIX: silver/transactions_clean/
      GOLD_PREFIX: gold/training_features/
      GOLD_VERSION: v1
      GOLD_STATE_OBJECT: _state/silver_to_gold/processed_files.json
      PYTHONUNBUFFERED: 1
    depends_on:
      - minio
    restart: "no"

  training:
    build:
      context: ./services/training
    container_name: mlops_training
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      GOLD_BUCKET: fraud-lake
      GOLD_PREFIX: gold/training_features/
      GOLD_VERSION: v1
      ARTIFACTS_BUCKET: ml-artifacts
      MODEL_PREFIX: models/fraud_model/
      METRICS_PREFIX: metrics/fraud_model/
      REPORTS_PREFIX: reports/fraud_model/
      PYTHONUNBUFFERED: 1
    depends_on:
      - minio
    restart: "no"

  kafka-init:
    image: apache/kafka:4.1.2
    depends_on:
      - kafka
    entrypoint: ["/bin/bash", "-c"]
    command: >
      "
      echo 'Waiting for Kafka...';
      sleep 10;
      /opt/kafka/bin/kafka-topics.sh --create \
        --if-not-exists \
        --topic raw_events \
        --bootstrap-server kafka:9092 \
        --partitions 1 \
        --replication-factor 1;
      echo 'Topic ready';
      "
    
volumes:
  postgres_data:
  minio_data:
  kafka_data:
  neo4j_data:
  neo4j_logs:
  shared_data: